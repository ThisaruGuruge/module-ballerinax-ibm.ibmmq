services:
  mq:
    image: icr.io/ibm-messaging/mq:latest
    container_name: ibmmq-test
    depends_on:
      mq-tls:
        condition: service_started
    ports:
      - "1414:1414"
    environment:
      - LICENSE=accept
      - MQ_QMGR_NAME=QM1
      - MQ_ADMIN_PASSWORD=password
      - MQ_APP_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "chkmqstarted"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - ./configs/config.mqsc:/etc/configs/config.mqsc
      - ./configs/topic-config.mqsc:/etc/configs/topic-config.mqsc
      - ./configs/apply-config.sh:/etc/mqm/apply-config.sh
    command: ["sh", "-c", "/etc/mqm/apply-config.sh"]

  mq-tls:
    image: icr.io/ibm-messaging/mq:latest
    container_name: ibmmq-test-tls
    ports:
      - "1415:1414"
    environment:
      - LICENSE=accept
      - MQ_QMGR_NAME=QM2
      - MQ_APP_PASSWORD=password
    volumes:
      - ./configs/config.mqsc:/etc/configs/config.mqsc
      - ./configs/topic-config.mqsc:/etc/configs/topic-config.mqsc
      - ./configs/apply-config.sh:/etc/mqm/apply-config.sh
      - ./secrets/server.crt:/etc/mqm/pki/keys/mykey/server.crt
      - ./secrets/server.key:/etc/mqm/pki/keys/mykey/server.key
      - ./secrets/client.crt:/etc/mqm/pki/trust/0/client.crt
    healthcheck:
      test: ["CMD-SHELL", "chkmqstarted"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: ["sh", "-c", "/etc/mqm/apply-config.sh"]
